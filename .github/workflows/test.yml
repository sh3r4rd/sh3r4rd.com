name: Test

# Frontend test pyramid: unit/integration (Vitest) + E2E (Playwright). Lint,
# build, Go tests, and Terraform validation live in ci.yml (which runs on the
# same triggers), so this workflow deliberately does NOT duplicate them.
# Triggers on pushes to main and on every pull request (so the Phase 5 epic's
# subtask PRs are checked too).
on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs on the same ref. A distinct group from ci.yml so the
# two workflows don't cancel each other.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # unit-tests and e2e-tests are independent, so neither `needs` the other (nor
  # a lint gate) — they run in parallel and surface their results together.
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache the Chromium download (the costly part) keyed on the resolved
      # Playwright version. On a hit, only the OS libraries are reinstalled.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (browser + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          # A config error / early crash may leave no report; don't let a
          # missing path turn into a second failure that masks the real one.
          if-no-files-found: ignore
