name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/recruiter-dashboard/lambda-src/email-parser

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: infra/recruiter-dashboard/lambda-src/email-parser/go.sum

      - name: Run tests
        run: go test -v -race ./...

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/recruiter-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.5.7'

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
